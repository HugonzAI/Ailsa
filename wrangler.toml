name = "ailsa"
main = ".open-next/worker.js"
compatibility_date = "2026-03-24"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

[vars]
MOCK_TRANSCRIPTION = "0"
MOCK_NOTE_GENERATION = "0"
MINIMAX_MODEL = "MiniMax-M2.7"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[d1_databases]]
binding = "AILSA_DB"
database_name = "ailsa-sessions"
database_id = "c4753247-7d5f-482d-b3a5-858a84e714f8"

[[routes]]
pattern = "ailsa.co.nz"
zone_name = "ailsa.co.nz"
custom_domain = true
